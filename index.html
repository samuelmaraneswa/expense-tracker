<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <!-- tailwind & font awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- sweet alert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    table thead th,table tbody td{
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body class="p-6">

  <div class="bg-gray-200 rounded-lg">
    <!-- header start -->
     <div class="flex flex-col md:flex-row items-start md:items-center gap-[6px] p-2">
      
      <!-- title & add start -->
      <div class="relative inline-flex items-center pr-8 rounded-xl">
        <h1 class="text-base md:text-lg">Expense Tracker</h1>
        <i id="addData" class="text-lg fa-solid fa-plus absolute top-1/2 -translate-y-1/2 right-[6px] cursor-pointer"></i>
      </div>
      <!-- title & add end-->

      <!-- search form start -->
      <div id="searchWrapper" class="flex relative flex-1 bg-amber-200 w-full">
        <input id="inputSearch" type="text" class="text-sm md:text-base w-full py-1 px-2 pr-[50px] focus:outline-none rounded" enterkeyhint="search" autocomplete="off">
        
        <i id="xSearch" class="fa-solid fa-x text-xs text-red-500 absolute right-[30px] top-1/2 -translate-y-1/2 cursor-pointer hidden"></i>
        
        <i class="fas fa-search text-gray-500 absolute top-1/2 -translate-y-1/2 cursor-pointer right-[6px]"></i>

        <div id="suggestions" class="absolute max-h-[350px] overflow-y-auto top-full bg-gray-100 w-full mt-0.5 rounded hidden z-10">
          <ul></ul>
        </div>
      </div>
      <!-- search form end -->

      <select name="" id="select" class="text-sm md:text-base py-1 px-2 rounded cursor-pointer">
        <option value="">--Pilih Category--</option>
      </select>

     </div>
    <!-- header end -->

    <!-- empty data text start -->
     <div id="emptyMessage" class="py-1 px-2"></div>
    <!-- empty data text end -->

    <!-- table start -->
     <div id="tableWrapper" class="w-full overflow-hidden mt-4 rounded-lg p-2 overflow-x-auto">
      <table class="w-full text-sm bg-white">
        <thead class="bg-indigo-500 text-white">
          <tr>
            <th>No</th>
            <th>Name</th>
            <th>Category</th>
            <th>Amount</th>
            <th class="">Action</th>
          </tr>
        </thead>
        <tbody id="tbodyData"></tbody>
      </table>
     </div>
    <!-- table end -->

    <!-- pagination start -->
     <div id="pagination" class="mt-4 flex items-center justify-center gap-5"></div>
    <!-- pagination end -->

    <!-- Total start -->
     <p id="totalExpensesText" class="p-2">Total Expenses: Rp <span id="totalExpenses">0</span></p>
    <!-- Total end -->

    <!-- modal addData start -->
     <div id="modalAddData" class="fixed flex items-start justify-center inset-0 bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300 p-4 md:p-0">

       <div id="modalContent" class="relative bg-white mt-12 px-12 md:px-16 py-4 md:py-8 rounded-lg w-[750px] transform scale-95 transition-transform  duration-300">

        <i class="fa-solid fa-x absolute bg-black text-white rounded-full text-sm cursor-pointer flex items-center justify-center px-3.5 py-1 -top-[13px] -right-[13px]"></i>

        <div class="flex flex-col">
          <div class="">
            <h2 id="modalAddTitle">Add Expense</h2>
            <hr class="border border-black mt-2">
          </div>

          <div class="mt-4 flex flex-col space-y-2">
            <label for="name">Name:</label>
            <input id="name" type="text" placeholder="Coffee" class="border border-gray-300 focus:outline-none px-2 py-1 rounded" autocomplete="off">
            <p id="text-error-name" class="italic text-xs text-red-500"></p>
            
            <label for="category">Category:</label>
            <input id="category" type="text" placeholder="Food" class="border border-gray-300 focus:outline-none px-2 py-1 rounded" autocomplete="off">
            <p id="text-error-category" class="italic text-xs text-red-500"></p>
            
            <label for="amount">Amount:</label>
            <input id="amount" type="text" placeholder="300.000" class="border border-gray-300 focus:outline-none px-2 py-1 rounded" autocomplete="off">
            <p id="text-error-amount" class="italic text-xs text-red-500"></p>
            
            <button id="saveBtn" class="bg-indigo-500 text-white px-2 py-1 !mt-6 mx-auto rounded hover:bg-indigo-700">Save</button>
          </div>
        </div>
      </div>
     </div>
    <!-- modal addData end -->
  </div>

  <script src="state.js"></script>
  <script src="filter.js"></script>

  <script src="render/layout.js"></script>
  <script src="render/table.js"></script>
  <script src="render/pagination.js"></script>
  <script src="render/total.js"></script>
  <script src="render/category.js"></script>

  <script src="modal.js"></script>

  <script src="handlers/pagination.js"></script>
  <script src="handlers/crud.js"></script>
  <script src="handlers/search.js"></script>

  <script src="main.js"></script>
</body>
</html>
